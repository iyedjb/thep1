<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mb74q.doctorhold.com</title>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        /* Overlay */
        #popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.35s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(28px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        /* Modal card */
        #popup-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 36px 32px 28px;
            width: 92%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.38), 0 0 0 1px rgba(255,255,255,0.08);
            animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
            text-align: center;
            position: relative;
        }
        #popup-card .emoji { font-size: 40px; margin-bottom: 14px; display: block; }
        #popup-card h2 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        #popup-card p {
            font-size: 0.82rem;
            color: #64748b;
            margin-bottom: 22px;
            line-height: 1.55;
        }
        #popup-card input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #0f172a;
            background: #f8fafc;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        #popup-card input:focus { border-color: #6366f1; background: #fff; }
        #popup-card button.primary {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
        }
        #popup-card button.primary:hover { opacity: 0.92; transform: scale(1.01); }
        #popup-card button.secondary {
            margin-top: 12px;
            background: none;
            border: none;
            font-size: 0.75rem;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        #popup-card button.secondary:hover { color: #64748b; }
        #popup-card .thanks {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
        }
        #popup-card .thanks .check {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #dcfce7;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
        }
        #popup-card .thanks p { margin: 0; font-size: 0.9rem; color: #166534; font-weight: 600; }
    </style>
</head>
<body>
    <iframe src="https://mb74q.doctorhold.com/l"></iframe>

    <div id="popup-overlay">
      <div id="popup-card">
        <div id="popup-form-content">
          <span class="emoji">👋</span>
          <h2>¿Te gustó nuestro producto?</h2>
          <p>Deja tu contacto y nuestro equipo se comunicará contigo pronto.</p>
          <input type="text" id="lead-name" placeholder="Tu nombre" autocomplete="name" />
          <input type="text" id="lead-contact" placeholder="Correo o WhatsApp" autocomplete="email" />
          <button class="primary" onclick="submitLead()">¡Contáctenme!</button>
          <br/>
          <button class="secondary" onclick="closePopup()">No, gracias</button>
        </div>
        <div class="thanks" id="popup-thanks">
          <div class="check">✅</div>
          <p>¡Gracias! Nos comunicaremos pronto.</p>
        </div>
      </div>
    </div>

    <script>
      function closePopup() {
        var overlay = document.getElementById('popup-overlay');
        if (overlay) {
          overlay.style.animation = 'fadeIn 0.2s ease reverse';
          setTimeout(function() { overlay.style.display = 'none'; }, 180);
        }
      }
      function submitLead() {
        var name = document.getElementById('lead-name').value.trim();
        var contact = document.getElementById('lead-contact').value.trim();
        if (!name || !contact) {
          document.getElementById('lead-name').style.borderColor = name ? '#e2e8f0' : '#ef4444';
          document.getElementById('lead-contact').style.borderColor = contact ? '#e2e8f0' : '#ef4444';
          return;
        }
        // Show thanks
        document.getElementById('popup-form-content').style.display = 'none';
        var thanks = document.getElementById('popup-thanks');
        thanks.style.display = 'flex';
        setTimeout(function() { closePopup(); }, 2800);
        // You can send the lead data to your backend here:
        // fetch('/api/leads', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, contact}) });
      }
    </script>
</body>
</html>
