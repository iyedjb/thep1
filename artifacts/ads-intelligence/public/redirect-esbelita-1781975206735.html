<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Oferta Oficial</title>
  <meta name="robots" content="index, follow" />
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
    }
    .background-screenshot {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://image.thum.io/get/auth/78022-creatorscreenshots/width/1280/crop/800/https://esbelita.doctornroman.com/l');
      background-size: 100% auto;
      background-position: top center;
      background-repeat: no-repeat;
      filter: blur(3px);
      -webkit-filter: blur(3px);
      z-index: 1;
    }
    .cookie-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      padding: 24px;
      cursor: pointer;
    }
    .cookie-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.05);
      text-align: center;
      cursor: default;
      z-index: 1000000;
      animation: cookiePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .cookie-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .cookie-desc {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .cookie-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .cookie-btn {
      flex: 1;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
    }
    .cookie-btn-primary {
      background: #4caf50;
      color: #ffffff;
    }
    .cookie-btn-primary:hover {
      background: #43a047;
    }
    .cookie-btn-secondary {
      background: #f44336;
      color: #ffffff;
    }
    .cookie-btn-secondary:hover {
      background: #e53935;
    }
    @keyframes cookiePop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="background-screenshot"></div>
  <div class="cookie-overlay" id="cookieOverlay">
    <div class="cookie-box" onclick="event.stopPropagation()">
      <div class="cookie-title">🍪 Política de Cookies</div>
      <p class="cookie-desc">
        Utilizamos cookies para personalizar sua experiência. Ao continuar, você concorda com nossos termos.
      </p>
      <div class="cookie-buttons">
        <button class="cookie-btn cookie-btn-primary" onclick="window.location.href='https://esbelita.doctornroman.com/l'">Aceitar</button>
        <button class="cookie-btn cookie-btn-secondary" onclick="window.location.href='https://esbelita.doctornroman.com/l'">Recusar</button>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('cookieOverlay').addEventListener('click', function() {
      window.location.href = 'https://esbelita.doctornroman.com/l';
    });
  </script>
</body>
</html>
